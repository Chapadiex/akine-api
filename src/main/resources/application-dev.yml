spring:
  datasource:
    url: jdbc:h2:mem:akine;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true

  mail:
    host: localhost
    port: 1025

app:
  seed:
    dev-users: true

logging:
  level:
    com.akine_api: DEBUG
    org.flywaydb: INFO
